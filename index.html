<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6a6a6a;
    --accent: #e8c84a;
    --accent-dim: rgba(232, 200, 74, 0.12);
    --active-border: #e8c84a;
    --radius: 4px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
  }

  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .url-input-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.6;
    padding: 10px 12px;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.15s;
  }
  .url-input-area::placeholder { color: var(--muted); }
  .url-input-area:focus { border-color: var(--accent); }

  .add-btn {
    margin-top: 8px;
    width: 100%;
    padding: 8px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-btn:hover { background: rgba(232, 200, 74, 0.2); }

  .queue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    flex-shrink: 0;
  }

  .queue-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .clear-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: #e05555; }

  .queue-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .queue-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
  }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
    margin-bottom: 2px;
  }
  .queue-item:hover { background: var(--surface2); }
  .queue-item.active {
    background: var(--accent-dim);
    border-left: 2px solid var(--active-border);
    padding-left: 6px;
  }

  .item-index {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 18px;
    text-align: right;
    flex-shrink: 0;
  }
  .queue-item.active .item-index { color: var(--accent); }

  .item-thumb {
    width: 60px;
    height: 34px;
    border-radius: 2px;
    background: var(--surface2);
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .item-info { flex: 1; min-width: 0; }

  .item-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .queue-item.active .item-title { color: var(--accent); }

  .item-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .item-remove {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    line-height: 1;
    border-radius: 3px;
    flex-shrink: 0;
    transition: opacity 0.1s, color 0.1s;
  }
  .queue-item:hover .item-remove { opacity: 1; }
  .item-remove:hover { color: #e05555; }

  /* PLAYER */
  .player-area {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  .player-wrap {
    flex: 1;
    position: relative;
    background: #000;
  }

  #yt-player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .player-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .player-empty-icon {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--muted);
  }

  .player-bar {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .now-playing-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .now-playing-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-btns {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    transition: background 0.1s, border-color 0.1s;
  }
  .nav-btn:hover { background: var(--border); border-color: var(--muted); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .autoplay-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .toggle-dot {
    width: 28px;
    height: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  .toggle-dot::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    top: 2px;
    left: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  .autoplay-toggle.on .toggle-dot { background: var(--accent-dim); border-color: var(--accent); }
  .autoplay-toggle.on .toggle-dot::after { transform: translateX(12px); background: var(--accent); }

  /* scrollbar */
  .queue-list::-webkit-scrollbar { width: 4px; }
  .queue-list::-webkit-scrollbar-track { background: transparent; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="wordmark">YT Queue</div>
      <textarea class="url-input-area" id="url-input"
        placeholder="Paste YouTube URLs here&#10;One per line, or comma-separated&#10;youtu.be/… or youtube.com/watch?v=…"></textarea>
      <button class="add-btn" onclick="addUrls()">+ Add to queue</button>
    </div>

    <div class="queue-header">
      <span class="queue-label" id="queue-count">Queue · 0 videos</span>
      <button class="clear-btn" onclick="clearQueue()">Clear all</button>
    </div>

    <div class="queue-list" id="queue-list">
      <div class="queue-empty" id="empty-msg">
        No videos yet.<br>Paste some URLs above.
      </div>
    </div>
  </div>

  <div class="player-area">
    <div class="player-wrap">
      <div class="player-empty" id="player-empty">
        <div class="player-empty-icon">▶</div>
        <span>Add URLs to get started</span>
      </div>
      <div id="yt-player"></div>
    </div>
    <div class="player-bar">
      <span class="now-playing-label">Now playing</span>
      <span class="now-playing-title" id="now-playing-title">—</span>
      <div class="nav-btns">
        <button class="nav-btn" id="btn-prev" onclick="prevVideo()" disabled>← Prev</button>
        <button class="nav-btn" id="btn-next" onclick="nextVideo()" disabled>Next →</button>
      </div>
      <label class="autoplay-toggle on" id="autoplay-toggle" onclick="toggleAutoplay()">
        <span class="toggle-dot"></span>
        <span>Autonext</span>
      </label>
    </div>
  </div>
</div>

<script>
  let queue = [];
  let currentIndex = -1;
  let player = null;
  let playerReady = false;
  let autoplay = true;
  let titles = {};

  function extractVideoId(url) {
    url = url.trim();
    const patterns = [
      /(?:youtube\.com\/watch\?(?:[^&]*&)*v=)([a-zA-Z0-9_-]{11})/,
      /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
      /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
      /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  function addUrls() {
    const raw = document.getElementById('url-input').value;
    const parts = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
    let added = 0;
    for (const part of parts) {
      const id = extractVideoId(part);
      if (id && !queue.find(v => v.id === id)) {
        queue.push({ id, title: id });
        added++;
      }
    }
    if (added > 0) {
      document.getElementById('url-input').value = '';
      renderQueue();
      if (currentIndex === -1) playVideo(0);
    }
  }

  function clearQueue() {
    queue = [];
    currentIndex = -1;
    titles = {};
    if (player && playerReady) player.stopVideo();
    document.getElementById('player-empty').style.display = 'flex';
    document.getElementById('now-playing-title').textContent = '—';
    renderQueue();
    updateNavBtns();
  }

  function removeVideo(i) {
    queue.splice(i, 1);
    if (currentIndex === i) {
      if (queue.length === 0) {
        currentIndex = -1;
        if (player && playerReady) player.stopVideo();
        document.getElementById('player-empty').style.display = 'flex';
        document.getElementById('now-playing-title').textContent = '—';
      } else {
        currentIndex = Math.min(i, queue.length - 1);
        playVideo(currentIndex);
      }
    } else if (currentIndex > i) {
      currentIndex--;
    }
    renderQueue();
    updateNavBtns();
  }

  function renderQueue() {
    const list = document.getElementById('queue-list');
    const emptyMsg = document.getElementById('empty-msg');
    document.getElementById('queue-count').textContent = `Queue · ${queue.length} video${queue.length !== 1 ? 's' : ''}`;

    list.querySelectorAll('.queue-item').forEach(el => el.remove());

    if (queue.length === 0) {
      emptyMsg.style.display = '';
      updateNavBtns();
      return;
    }

    emptyMsg.style.display = 'none';

    queue.forEach((v, i) => {
      const item = document.createElement('div');
      item.className = 'queue-item' + (i === currentIndex ? ' active' : '');
      item.innerHTML = `
        <span class="item-index">${i + 1}</span>
        <img class="item-thumb" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg" alt="" loading="lazy">
        <div class="item-info">
          <div class="item-title">${titles[v.id] || v.id}</div>
          <div class="item-id">${v.id}</div>
        </div>
        <button class="item-remove" onclick="event.stopPropagation(); removeVideo(${i})" title="Remove">×</button>
      `;
      item.addEventListener('click', () => playVideo(i));
      list.appendChild(item);
    });

    updateNavBtns();
  }

  function playVideo(index) {
    if (index < 0 || index >= queue.length) return;
    currentIndex = index;
    const vid = queue[index];

    document.getElementById('player-empty').style.display = 'none';
    document.getElementById('now-playing-title').textContent = titles[vid.id] || vid.id;

    if (player && playerReady) {
      player.loadVideoById(vid.id);
    } else if (!player) {
      player = new YT.Player('yt-player', {
        videoId: vid.id,
        playerVars: { autoplay: 1, rel: 0, modestbranding: 1, enablejsapi: 1 },
        events: {
          onReady: () => { playerReady = true; },
          onStateChange: onPlayerStateChange,
          onError: () => nextVideo()
        }
      });
    }

    renderQueue();
    updateNavBtns();
    scrollActiveIntoView();

    if (playerReady && player.getVideoData) {
      setTimeout(() => {
        const data = player.getVideoData();
        if (data && data.title && data.title !== 'YouTube') {
          titles[vid.id] = data.title;
          document.getElementById('now-playing-title').textContent = data.title;
          renderQueue();
        }
      }, 1200);
    }
  }

  function onPlayerStateChange(e) {
    const YT_ENDED = 0;
    if (e.data === YT_ENDED && autoplay) {
      nextVideo();
    }
    if (e.data === 1) {
      const data = player.getVideoData && player.getVideoData();
      if (data && data.title && data.title !== 'YouTube' && currentIndex >= 0) {
        const id = queue[currentIndex]?.id;
        if (id && titles[id] !== data.title) {
          titles[id] = data.title;
          document.getElementById('now-playing-title').textContent = data.title;
          renderQueue();
        }
      }
    }
  }

  function nextVideo() {
    if (currentIndex < queue.length - 1) playVideo(currentIndex + 1);
  }

  function prevVideo() {
    if (currentIndex > 0) playVideo(currentIndex - 1);
  }

  function updateNavBtns() {
    document.getElementById('btn-prev').disabled = currentIndex <= 0;
    document.getElementById('btn-next').disabled = currentIndex >= queue.length - 1 || queue.length === 0;
  }

  function toggleAutoplay() {
    autoplay = !autoplay;
    const el = document.getElementById('autoplay-toggle');
    el.classList.toggle('on', autoplay);
  }

  function scrollActiveIntoView() {
    setTimeout(() => {
      const active = document.querySelector('.queue-item.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  document.getElementById('url-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) addUrls();
  });

  window.onYouTubeIframeAPIReady = function() {};
</script>

<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
